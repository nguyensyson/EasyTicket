spring:
  application:
    name: TicketService-application
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:easyticket_redis}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:ticket-service}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/easyticket/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8082}

keycloak:
  client-id: ${KEYCLOAK_CLIENT_ID:ticket-service-client}

services:
  event-service:
    url: ${EVENT_SERVICE_URL:http://localhost:8081}

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
    metrics:
      export:
        url: ${OTEL_METRICS_ENDPOINT:http://otel-collector:4318/v1/metrics}
  metrics:
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    root: INFO
    com.easytickets: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId},%X{spanId}] %-5level %logger{36} - %msg%n"

url:
  permit:
    - path: "/api/v1/tickets/*/availability"
      methods: ["GET"]
    - path: "/actuator/health"
      methods: ["GET"]

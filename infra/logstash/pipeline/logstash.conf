##
# Logstash Pipeline – EasyTicket
#
# Input:  TCP port 5000 (JSON logs từ Spring Boot Logback)
#         Beats port 5044 (Filebeat nếu dùng sau này)
# Filter: Parse Spring Boot log format, inject service name, traceId
# Output: Elasticsearch với index theo tên service và ngày
##

input {
  # Nhận logs qua TCP – Spring Boot gửi trực tiếp qua LogstashEncoder
  tcp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }

  # Nhận logs qua UDP
  udp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }

  # Beats input (Filebeat) – dùng nếu cần đọc log file
  beats {
    port => 5044
    type => "beats"
  }
}

filter {
  if [type] == "spring-boot" {
    # Trích xuất timestamp từ log nếu có field @timestamp từ Logback
    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
        target => "@timestamp"
      }
    }

    # Đặt tên index dựa trên tên service (Spring app name)
    if [logger_name] {
      mutate {
        add_field => { "[@metadata][index_prefix]" => "%{[service_name]}" }
      }
    }

    # Xóa các field không cần thiết để tiết kiệm storage
    mutate {
      remove_field => ["host", "port"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Index theo service-name và ngày: easyticket-authservice-2025.06.28
    index => "easyticket-%{[service_name]:unknown}-%{+YYYY.MM.dd}"
    # Dùng traceId làm document ID để tránh duplicate nếu có
    # document_id => "%{traceId}-%{@timestamp}"
  }

  # Debug: xem logs trong Logstash console (bỏ comment khi cần debug)
  # stdout {
  #   codec => rubydebug
  # }
}

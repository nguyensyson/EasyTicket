##
# Logstash Pipeline – EasyTicket
#
# Input:
#   TCP port 5000  – JSON logs từ Spring Boot Logback (LogstashTcpSocketAppender)
#   HTTP port 5000 – OTLP JSON logs forward từ OTel Collector (nếu service dùng OTLP logs)
#
# Filter:
#   Parse Spring Boot JSON log format
#   Đảm bảo traceId/spanId có mặt để correlate với APM traces
#
# Output:
#   Elasticsearch – index theo service name và ngày
#   Pattern: easyticket-{service_name}-YYYY.MM.dd
##

input {
  # Nhận structured JSON logs qua TCP từ Spring Boot Logback
  # Spring Boot dùng LogstashTcpSocketAppender trong logback-spring.xml
  tcp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }

  # Nhận qua UDP (fallback)
  udp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }
}

filter {
  if [type] == "spring-boot" {
    # Parse timestamp từ field @timestamp hoặc timestamp của Logback
    if [timestamp] {
      date {
        match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
        target => "@timestamp"
        remove_field => ["timestamp"]
      }
    }

    # Chuẩn hoá tên service từ field "service" gửi lên bởi LogstashEncoder
    # customFields: {"service": "${spring.application.name}"}
    if ![service_name] and [service] {
      mutate {
        rename => { "service" => "service_name" }
      }
    }

    # Đảm bảo traceId/spanId luôn có mặt (empty string nếu không có)
    # Giúp Kibana filter và correlate với APM traces
    if ![traceId] {
      mutate {
        add_field => { "traceId" => "" }
      }
    }
    if ![spanId] {
      mutate {
        add_field => { "spanId" => "" }
      }
    }

    # Xóa các field nội bộ không cần thiết
    mutate {
      remove_field => ["host", "port", "@version", "tags"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Index pattern: easyticket-auth-service-application-2025.06.28
    # Kibana Index Pattern: easyticket-logs-* hoặc easyticket-*
    index => "easyticket-%{[service_name]:unknown}-%{+YYYY.MM.dd}"
    # ILM để tự động xoá index cũ (cấu hình trong Kibana nếu cần)
    ilm_enabled => false
  }

  # Debug – bỏ comment khi cần xem log raw trong Logstash console
  # stdout {
  #   codec => rubydebug
  # }
}

##############################################################
# EasyTicket – API Gateway (LOCAL SIMULATION ONLY)
#
# Ở prod/dev, API Gateway thật là AWS API Gateway (rate-limiting,
# TLS termination, routing) — không dùng NGINX/Kubernetes Ingress.
# Config này chỉ giả lập lớp gateway đó ở local (docker compose) để
# dev có một entrypoint duy nhất giống production, kèm Swagger UI
# tổng hợp OpenAPI docs của toàn bộ service.
#
# Các service Spring Boot chạy trực tiếp trên host (mvnw spring-boot:run),
# KHÔNG chạy trong container này, nên nginx forward request ra ngoài
# container qua host.docker.internal:{port}.
##############################################################

# ── Rate limiting – giả lập chống bot của API Gateway thật ────────
# 20 request/s/IP, cho phép burst 40 request rồi mới bắt đầu từ chối.
limit_req_zone $binary_remote_addr zone=easyticket_api:10m rate=20r/s;

# ── Upstreams – từng service Spring Boot chạy trên host machine ───
upstream event_service {
    server host.docker.internal:8081;
}

upstream ticket_service {
    server host.docker.internal:8082;
}

upstream order_service {
    server host.docker.internal:8083;
}

upstream payment_service {
    server host.docker.internal:8084;
}

upstream notification_service {
    server host.docker.internal:8085;
}

upstream user_service {
    server host.docker.internal:8092;
}

server {
    listen 80;
    server_name localhost;

    # Header chuẩn khi reverse-proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 65s;

    # ── Healthcheck của chính gateway ──────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ── Business API – route theo path, giống hệt cách gọi khi lên
    #    AWS API Gateway ở prod/dev (không đổi path, không thêm prefix
    #    tên service) ─────────────────────────────────────────────
    location /api/v1/events {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://event_service;
    }

    location /api/v1/locations {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://event_service;
    }

    location /api/v1/tickets {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://ticket_service;
    }

    location /api/v1/orders {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://order_service;
    }

    location /api/v1/payments {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://payment_service;
    }

    location /api/v1/notifications {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://notification_service;
    }

    location /api/v1/users {
        limit_req zone=easyticket_api burst=40 nodelay;
        proxy_pass http://user_service;
    }

    # ── OpenAPI docs – mỗi service expose /v3/api-docs cùng path nên
    #    phải tách theo prefix riêng rồi rewrite trước khi proxy.
    #    Swagger UI (aggregator) gọi vào các URL này. ───────────────
    location /docs/event-service/ {
        rewrite ^/docs/event-service/(.*)$ /$1 break;
        proxy_pass http://event_service;
    }

    location /docs/ticket-service/ {
        rewrite ^/docs/ticket-service/(.*)$ /$1 break;
        proxy_pass http://ticket_service;
    }

    location /docs/order-service/ {
        rewrite ^/docs/order-service/(.*)$ /$1 break;
        proxy_pass http://order_service;
    }

    location /docs/payment-service/ {
        rewrite ^/docs/payment-service/(.*)$ /$1 break;
        proxy_pass http://payment_service;
    }

    location /docs/notification-service/ {
        rewrite ^/docs/notification-service/(.*)$ /$1 break;
        proxy_pass http://notification_service;
    }

    location /docs/user-service/ {
        rewrite ^/docs/user-service/(.*)$ /$1 break;
        proxy_pass http://user_service;
    }

    # ── Swagger UI tổng hợp – trang mặc định của gateway ───────────
    location / {
        proxy_pass http://swagger-ui:8080/;
    }
}
